      <stop offset="0.46" stop-color="#f5f1e8"/>
      <stop offset="1" stop-color="#fffdfa"/>
    </linearGradient>
    <linearGradient id="liquidity" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f766e" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#0f766e" stop-opacity="0.48"/>
      <stop offset="0.68" stop-color="#2f8f86" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0f766e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="credit" x1="0" y1="0" x2="1" y2="0">
