<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1900" role="img" aria-labelledby="title desc">
  <title id="title">The Floating-Rate Fault Line title-page artwork</title>
  <desc id="desc">Abstract title-page artwork with liquidity flows, credit stress bands, and a central rate fault.</desc>
  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="1">
